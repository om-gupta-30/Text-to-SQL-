name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for sensitive files
        run: |
          echo "Checking for .env files..."
          if git ls-files | grep -E "\.env$"; then
            echo "❌ ERROR: .env file found in git!"
            exit 1
          fi
          
          echo "Checking for database files..."
          if git ls-files | grep -E "\.(db|sqlite|sqlite3)$"; then
            echo "❌ ERROR: Database file found in git!"
            exit 1
          fi
          
          echo "Checking for API keys in code..."
          if git grep -E "sk-[a-zA-Z0-9]{20,}" HEAD; then
            echo "❌ ERROR: Potential API key found in code!"
            exit 1
          fi
          
          echo "✅ Security check passed!"

  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    needs: security-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile main.py database.py llm.py models.py
          echo "✅ Python syntax check passed!"

      - name: Check code formatting
        run: |
          cd backend
          pip install black
          black --check --diff . || echo "⚠️  Consider running 'black .' to format code"

      - name: Type checking
        run: |
          cd backend
          pip install mypy
          mypy --install-types --non-interactive . || echo "⚠️  Type hints could be improved"
        continue-on-error: true

      - name: Security scan
        run: |
          cd backend
          pip install bandit
          bandit -r . -ll || echo "⚠️  Security scan completed"
        continue-on-error: true

  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    needs: security-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint check
        run: |
          cd frontend
          npm run lint || echo "⚠️  Linting warnings found"
        continue-on-error: true

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend build successful!"

      - name: Check build output
        run: |
          if [ -d "frontend/dist" ]; then
            echo "✅ Build directory created successfully"
            ls -la frontend/dist
          else
            echo "❌ Build directory not found!"
            exit 1
          fi

  integration-check:
    name: 🔗 Integration Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        run: |
          echo "Checking required files..."
          
          required_files=(
            "README.md"
            "LICENSE"
            ".gitignore"
            "Makefile"
            "backend/main.py"
            "backend/database.py"
            "backend/llm.py"
            "backend/models.py"
            "backend/requirements.txt"
            "backend/.env.example"
            "frontend/package.json"
            "frontend/src/App.jsx"
          )
          
          missing_files=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              missing_files=$((missing_files + 1))
            fi
          done
          
          if [ $missing_files -eq 0 ]; then
            echo "✅ All required files present!"
          else
            echo "❌ $missing_files required files missing!"
            exit 1
          fi

      - name: Verify .env.example files
        run: |
          echo "Checking .env.example files..."
          
          if [ ! -f "backend/.env.example" ]; then
            echo "❌ backend/.env.example is missing!"
            exit 1
          fi
          
          if grep -q "sk-" backend/.env.example; then
            echo "❌ Real API key found in .env.example!"
            exit 1
          fi
          
          echo "✅ .env.example files are safe!"

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          
          if [ ! -s "README.md" ]; then
            echo "❌ README.md is empty or missing!"
            exit 1
          fi
          
          if ! grep -q "Quick Start" README.md; then
            echo "⚠️  README.md might be incomplete"
          fi
          
          echo "✅ Documentation check passed!"

  all-checks-passed:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [security-check, backend-tests, frontend-tests, integration-check]
    
    steps:
      - name: Success message
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 All CI/CD checks passed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Security check"
          echo "✅ Backend tests"
          echo "✅ Frontend tests"
          echo "✅ Integration check"
          echo ""
          echo "Safe to merge! 🚀"
